    <ins style="position: fixed;z-index: 100;left:0;bottom:0;pointer-events: none;user-select: none; color:magenta">
       v1.5k2

    <script>
        const canvas = document.querySelector("canvas");
        const ctx = canvas.getContext("2d");
        // working res = 960x1080
        function pixelToMath(xy) {
            return [
                (xy[0] - 480) / 48,
                (xy[1] - 540) / 48
            ]
        }
        function mathToPixel(xy) {
            return [
                (xy[0] * 48) + 480,
                (xy[1] * 48) + 540
            ]
        }
        function unitToPixel(k) {
            return k * 48;
        }
        const imageContainer = ctx.createImageData(1920, 1080, { colorSpace: "srgb" });
        const fb = imageContainer.data;
        const gizmos = localStorage.getItem("kwwkam11100412") ? JSON.parse(localStorage.getItem("kwwkam11100412")) : [
            {
                type: "circle",
                handlePositions: [[0, 0], [3, 0]],
                transformedPositions: [[0, 0], [4, 0]],
                col: "blue",
                let: "A"
            }
        ];
        function findParabolaCoefficients(h1, h2, h3) {
            const [x1, y1] = h1;
            const [x2, y2] = h2;
            const [x3, y3] = h3;
            let denominator = (x1 - x2) * (x1 - x3) * (x2 - x3);

            let a = (x3 * (y2 - y1) + x2 * (y1 - y3) + x1 * (y3 - y2)) / denominator;
            let b = ((x3 ** 2) * (y1 - y2) + (x2 ** 2) * (y3 - y1) + (x1 ** 2) * (y2 - y3)) / denominator;
            let c = ((x1 ** 2) * (x2 * y3 - x3 * y2) + (x2 ** 2) * (x3 * y1 - x1 * y3) + (x3 ** 2) * (x1 * y2 - x2 * y1)) / denominator;

            return [a, b, c];
        };
        function findHyperbolaCoefficients(p1, p2, p3) {
            const [x1, y1] = p1;
            const [x2, y2] = p2;
            const [x3, y3] = p3;
            
            const det = (x1 * (y3 - y2) + x2 * (y1 - y3) + x3 * (y2 - y1));

            if (Math.abs(det) < 1e-10) {
                return [0,0,0];
            }

            const a = (x1 * y1 * (y3 - y2) + x2 * y2 * (y1 - y3) + x3 * y3 * (y2 - y1)) / det;
            const b = (x1 * y1 * (x3 * y2 - x2 * y3) + x2 * y2 * (x1 * y3 - x3 * y1) + x3 * y3 * (x2 * y1 - x1 * y2)) / det;
            const c = (x1 * (x3 * y3 - x2 * y2) + x2 * (x1 * y1 - x3 * y3) + x3 * (x2 * y2 - x1 * y1)) / det;

            //y = (a*x + b) / (x + c)
            return [ a, b, c ];
        }
        function findCubicCoefficients(p1, p2, p3, p4) {
            const [x1, y1] = p1;
            const [x2, y2] = p2;
            const [x3, y3] = p3;
            const [x4, y4] = p4;
            const det4x4 = (m) => {
                return (
                    m[0][0] * (m[1][1] * (m[2][2] * m[3][3] - m[2][3] * m[3][2]) - m[1][2] * (m[2][1] * m[3][3] - m[2][3] * m[3][1]) + m[1][3] * (m[2][1] * m[3][2] - m[2][2] * m[3][1])) -
                    m[0][1] * (m[1][0] * (m[2][2] * m[3][3] - m[2][3] * m[3][2]) - m[1][2] * (m[2][0] * m[3][3] - m[2][3] * m[3][0]) + m[1][3] * (m[2][0] * m[3][2] - m[2][2] * m[3][0])) +
                    m[0][2] * (m[1][0] * (m[2][1] * m[3][3] - m[2][3] * m[3][1]) - m[1][1] * (m[2][0] * m[3][3] - m[2][3] * m[3][0]) + m[1][3] * (m[2][0] * m[3][1] - m[2][1] * m[3][0])) -
                    m[0][3] * (m[1][0] * (m[2][1] * m[3][2] - m[2][2] * m[3][1]) - m[1][1] * (m[2][0] * m[3][2] - m[2][2] * m[3][0]) + m[1][2] * (m[2][0] * m[3][1] - m[2][1] * m[3][0]))
                );
            };
            const M = [
                [x1 ** 3, x1 ** 2, x1, 1],
                [x2 ** 3, x2 ** 2, x2, 1],
                [x3 ** 3, x3 ** 2, x3, 1],
                [x4 ** 3, x4 ** 2, x4, 1]
            ];
            const mainDet = det4x4(M);
            if (Math.abs(mainDet) < 1e-10) {
                return [0, 0, 0, 0];
            }
            const getColDet = (colIdx) => {
                const copy = M.map((row, i) => {
                    const newRow = [...row];
                    newRow[colIdx] = [y1, y2, y3, y4][i];
                    return newRow;
                });
                return det4x4(copy);
            };
            let a = getColDet(0) / mainDet;
            let b = getColDet(1) / mainDet;
            let c = getColDet(2) / mainDet;
            let d = getColDet(3) / mainDet;
            return [a, b, c, d];
        }

        function dist(a, b) {
            return Math.sqrt(
                Math.pow(a[0] - b[0], 2) +
                Math.pow(a[1] - b[1], 2)
            );
        }
        function formatNum(c) {
            if (c > 0) {
                c = " + " + c.toFixed(3);
            } else if (c < 0) {
                c = " - " + (-c).toFixed(3);
            } else {
                c = "";
            }
            return c;
        }
        function generalToTP(a, b, c) {
            //a(x + h)^2 + k
            const hb = (b/a)/2;
            const b2 = hb**2;
            // a(x+hb)^2 + c + b2
            return [a, hb, c - (b ** 2 / (4 * a))];
        }
        function getKlerp(n1, n2) {
            //return ` k\\left(${(n2).toFixed(3)}-${(n1).toFixed(3)}\\right)+${n1.toFixed(3)} `;

            if ((n2 - n1) === 0) {
                return ` ${formatNum(n1) || "0"} `;
            } else {
                return ` ${(n2 - n1).toFixed(3)}k ${formatNum(n1)} `;
            }
        }
        function getRangeOfParabola(parabolaConfig, domain) {
            const parabola = (x)=>parabolaConfig[0]*(x**2) + parabolaConfig[1]*x + parabolaConfig[2];
            let minVal = Infinity;
            let maxVal = -Infinity;
            for (let x = domain[0]; x < domain[1]; x += 0.1) { //might not include domain end
                const y = parabola(x);
                minVal = Math.min(minVal, y);
                maxVal = Math.max(maxVal, y);
            }
            const endY = parabola(domain[1]);
            minVal = Math.min(minVal, endY);
            maxVal = Math.max(maxVal, endY);
            return [minVal, maxVal];
        }
        const graphDB = {
            "circle": {
                defaultHandles: [[0, 0], [0, 3]],
                drawGraph: (handles, side, c) => {
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = c || "blue";
                    ctx.beginPath();
                    const radius = Math.sqrt(
                        Math.pow(handles[0][0] - handles[1][0], 2) +
                        Math.pow(handles[0][1] - handles[1][1], 2)
                    );
                    const root = mathToPixel(handles[0]);
                    const r = unitToPixel(radius);
                    ctx.arc(root[0] + 960 * side, root[1], r, 0, Math.PI * 2);
                    ctx.stroke();
                },
                getDef: (handles, trans) => {
                    const radius = Math.sqrt(
                        Math.pow(handles[0][0] - handles[1][0], 2) +
                        Math.pow(handles[0][1] - handles[1][1], 2)
                    );
                    const radius2 = Math.sqrt(
                        Math.pow(trans[0][0] - trans[1][0], 2) +
                        Math.pow(trans[0][1] - trans[1][1], 2)
                    );
                    const xOffset = formatNum(-handles[0][0]);
                    const yOffset = formatNum(-handles[0][1]);
                    const xOffsetT = formatNum(-trans[0][0]);
                    const yOffsetT = formatNum(-trans[0][1]);
                    let out = `(x${xOffset})² + (y${yOffset})² = ${(radius**2).toFixed(3)} = (${radius.toFixed(3)})²`
                    //out += `\n ╰ Transform: ${(deltaA).toFixed(3)} * f(x, y ${formatNum(trans[0][0]-handles[0][0])}) ${formatNum(trans[0][1]-handles[0][1])}`;
                    out += `\n ╰ Dilate by ${
                        (radius2/radius).toFixed(3)
                    }`;
                    out += `\n ╰ Translate Vertically by ${
                        (trans[0][1]-handles[0][1]).toFixed(3)
                    }`;
                    out += `\n ╰ Translate Horizontally by ${
                        (trans[0][0]-handles[0][0]).toFixed(3)
                    }`;
                    out += `\n ╰ Transformed Formula:\nㅤㅤㅤ(x${xOffsetT})² + (y${yOffsetT})² = ${(radius2**2).toFixed(3)} = (${radius2.toFixed(3)})²`;
                    out += `\n ╰Desmos Code: <input value="(x - (${getKlerp(handles[0][0], trans[0][0])}))² + (y - (${getKlerp(handles[0][1], trans[0][1])}))² = ${getKlerp(radius**2, radius2**2)}">`;
                    return out;
                }
            },
            "linear": {
                defaultHandles: [[-2, 0.5], [2, -0.5]],
                getDef: (handles, transforms) => {
                    const m = (handles[0][1] - handles[1][1])/(handles[0][0]-handles[1][0]);
                    let c = handles[0][1] - m * handles[0][0];
                    
                    const mT = (transforms[0][1] - transforms[1][1])/(transforms[0][0]-transforms[1][0]);
                    let c_t = transforms[0][1] - mT * transforms[0][0];
                    let out = `y = ${
                    m.toFixed(3)
                    }x${formatNum(c)}; ${
                    Math.max(handles[0][0], handles[1][0]).toFixed(3)
                    } ≥ x ≥ ${Math.min(handles[0][0], handles[1][0]).toFixed(3)}`;
                    out += `\n ╰ Fn Range: ${Math.max(handles[0][1], handles[1][1]).toFixed(3)} ≥ y ≥ ${Math.min(handles[0][1], handles[1][1]).toFixed(3)}`
                    out += `\n ╰ Transform: f(${(mT/m).toFixed(3)}x) ${formatNum(c_t-c)}`;
                    out += `\n ╰ Dilate Horizontally by ${
                        (mT/m).toFixed(3)
                    }`;
                    out += `\n ╰ Translate Vertically by ${
                        (c_t-c).toFixed(3)
                    }`;
                    out += `\n ╰ Transformed Formula:\nㅤㅤㅤy = ${
                    mT.toFixed(3)
                    }x${formatNum(c_t)}; ${
                    Math.max(transforms[0][0], transforms[1][0]).toFixed(3)
                    } ≥ x ≥ ${Math.min(transforms[0][0], transforms[1][0]).toFixed(3)}`;
                    // k(b-a)+a
                    out += `\n ╰Desmos Code: <input value="(${getKlerp(m, mT)})x+${getKlerp(c, c_t)} \\left\\{${
                        getKlerp(Math.max(handles[0][0], handles[1][0]), Math.max(transforms[0][0], transforms[1][0]))
                    }\\ge x\\ge${
                        getKlerp(Math.min(handles[0][0], handles[1][0]), Math.min(transforms[0][0], transforms[1][0]))
                    }\\right\\}">`;
                    //\left\{2k>x>-4k\right\}
                    return out;
                },
                drawGraph: (handles, side, c) => {
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = c || "blue";
                    ctx.beginPath();
                    const handle1 = mathToPixel(handles[0]);
                    handle1[0] += 960 * side;
                    ctx.moveTo(...handle1);
                    const handle2 = mathToPixel(handles[1]);
                    handle2[0] += 960 * side;
                    ctx.lineTo(...handle2);
                    ctx.stroke();
                }
            },
            "parabola": {
                defaultHandles: [[-2, -1], [0, 1], [2, -1]],
                drawGraph: (handles, side, c) => {
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = c || "blue";
                    const startX = Math.min(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0]
                    );
                    const endX = Math.max(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0]
                    );
                    const [a, b, ci] = findParabolaCoefficients(...handles);
                    ctx.beginPath();
                    for (let x = startX; x <= endX; x += 0.1) {
                        const y = a * (x ** 2) + b * x + ci;
                        const pos = mathToPixel([x, y]);
                        pos[0] += side * 960;
                        if (x === startX) {
                            ctx.moveTo(...pos);
                        } else {
                            ctx.lineTo(...pos);
                        }
                    }
                    const y = a * (endX ** 2) + b * endX + ci;
                    const pos = mathToPixel([endX, y]);
                    pos[0] += side * 960;
                    ctx.lineTo(...pos);

                    ctx.stroke();
                },
                getDef: (handles, trans) => {
                    const [a1, b1, c1] = findParabolaCoefficients(...handles);
                    const [f1, h1, k1] = generalToTP(a1, b1, c1);
                    const [a2, b2, c2] = findParabolaCoefficients(...trans);
                    const [f2, h2, k2] = generalToTP(a2, b2, c2);
                    const startX = Math.min(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0]
                    );
                    const endX = Math.max(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0]
                    );
                    const TstartX = Math.min(
                        trans[0][0],
                        trans[1][0],
                        trans[2][0]
                    );
                    const TendX = Math.max(
                        trans[0][0],
                        trans[1][0],
                        trans[2][0]
                    );
                    let out = `y = ${(f1).toFixed(3)}(x${formatNum(h1)})²${formatNum(k1)}; ${endX.toFixed(3)}≥ x ≥${startX.toFixed(3)}`;
                    const deltaH = h2 - h1;
                    const deltaA = f2 / f1;
                    const [ minRange, maxRange ] = getRangeOfParabola([a1, b1, c1], [startX, endX]);
                    out += `\n ╰ Fn Range: ${maxRange.toFixed(3)} ≥ y ≥ ${minRange.toFixed(3)}`;
                    out += `\n ╰ Transform: ${(deltaA).toFixed(3)} * f(x ${formatNum(deltaH)}) ${formatNum(k2 - deltaA*k1)}`;
                    //out += `\n ╰ Transform: ${(f2/f1).toFixed(3)}(f(x ${formatNum(-(h2-h1))})) ${formatNum(k2-k1)}`;
                    out += `\n ╰ Translate Horizontally by ${
                        (deltaH).toFixed(3)
                    }`;
                    out += `\n ╰ Dilate Vertically (×a) ${
                        deltaA.toFixed(3)
                    }`;
                    out += `\n ╰ Translate Vertically by ${
                        (k2 - deltaA*k1).toFixed(3)
                    }`;
                    out += `\n ╰ Transformed Formula: \nㅤㅤㅤy = ${(f2).toFixed(3)}(x${formatNum(h2)})²${formatNum(k2)}; ${TendX.toFixed(3)} ≥ x ≥ ${TstartX.toFixed(3)}`;
                    out += `\n ╰Desmos Code: <input value="(${getKlerp(f1, f2)})(x + ${getKlerp(h1, h2)})^{2}+${getKlerp(k1, k2)}\\ \\left\\{${getKlerp(endX, TendX)}\\ge x\\ge${getKlerp(startX, TstartX)}\\right\\}">`;
                    return out;
                }
            },
            "x_parabola": {
                defaultHandles: [[-1, -2], [1, 0], [-1, 2]],
                drawGraph: (handles, side, c) => {
                    handles = structuredClone(handles);
                    handles = handles.map(x => [x[1], x[0]]);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = c || "blue";
                    const startX = Math.min(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0]
                    );
                    const endX = Math.max(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0]
                    );
                    const [a, b, ci] = findParabolaCoefficients(...handles);
                    ctx.beginPath();
                    for (let x = startX; x <= endX; x += 0.1) {
                        const y = a * (x ** 2) + b * x + ci;
                        const pos = mathToPixel([y, x]);
                        pos[0] += side * 960;
                        if (x === startX) {
                            ctx.moveTo(...pos);
                        } else {
                            ctx.lineTo(...pos);
                        }
                    }
                    const y = a * (endX ** 2) + b * endX + ci;
                    const pos = mathToPixel([y, endX]);
                    pos[0] += side * 960;
                    ctx.lineTo(...pos);

                    ctx.stroke();
                },
                getDef: (handles, trans) => {
                    handles = structuredClone(handles);
                    handles = handles.map(x => [x[1], x[0]]);
                    trans = structuredClone(trans);
                    trans = trans.map(x => [x[1], x[0]]);
                    const [a1, b1, c1] = findParabolaCoefficients(...handles);
                    const [f1, h1, k1] = generalToTP(a1, b1, c1);
                    const [a2, b2, c2] = findParabolaCoefficients(...trans);
                    const [f2, h2, k2] = generalToTP(a2, b2, c2);
                    const startX = Math.min(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0]
                    );
                    const endX = Math.max(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0]
                    );
                    const TstartX = Math.min(
                        trans[0][0],
                        trans[1][0],
                        trans[2][0]
                    );
                    const TendX = Math.max(
                        trans[0][0],
                        trans[1][0],
                        trans[2][0]
                    );
                    const deltaH = h2 - h1;
                    const deltaA = f2 / f1;
                    let out = `x = ${(f1).toFixed(3)}(y${formatNum(h1)})²${formatNum(k1)}; ${endX.toFixed(3)} ≥ y ≥ ${startX.toFixed(3)}`;
                    const [ minRange, maxRange ] = getRangeOfParabola([a1, b1, c1], [startX, endX]);
                    out += `\n ╰ Fn Range: ${maxRange.toFixed(3)} ≥ x ≥ ${minRange.toFixed(3)}`;
                    out += `\n ╰ Transform: ${(deltaA).toFixed(3)} * f(y ${formatNum(deltaH)}) ${formatNum(k2 - deltaA*k1)}`;
                    out += `\n ╰ Translate Vertically by ${
                        deltaH.toFixed(3)
                    }`;
                    out += `\n ╰ Dilate Horizontally (×a) ${
                        deltaA.toFixed(3)
                    }`;
                    out += `\n ╰ Translate Horizontally by ${
                        (k2 - deltaA*k1).toFixed(3)
                    }`;
                    out += `\n ╰ Transformed Formula: \nㅤㅤㅤx = ${(f2).toFixed(3)}(y${formatNum(h2)})²${formatNum(k2)}; ${TendX.toFixed(3)}≥ y ≥${TstartX.toFixed(3)}`;
                    out += `\n ╰Desmos Code: <input value="x = (${getKlerp(f1, f2)})(y + ${getKlerp(h1, h2)})^{2}+${getKlerp(k1, k2)}\\ \\left\\{${getKlerp(endX, TendX)}\\ge y\\ge${getKlerp(startX, TstartX)}\\right\\}">`;
                    return out;
                }
            },
            "cubic": {
                defaultHandles: [[-3, 4], [-2, 6], [2, 1], [3, 3]],
                drawGraph: (handles, side, col) => {
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = col || "blue";
                    const startX = Math.min(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0],
                        handles[3][0],
                    );
                    const endX = Math.max(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0],
                        handles[3][0],
                    );
                    const [a, b, c, d] = findCubicCoefficients(...handles);
                    ctx.beginPath();
                    for (let x = startX; x <= endX; x += 0.1) {
                        const y = a * (x ** 3) + b * (x ** 2) + c * x + d;
                        const pos = mathToPixel([x, y]);
                        pos[0] += side * 960;
                        if (x === startX) {
                            ctx.moveTo(...pos);
                        } else {
                            ctx.lineTo(...pos);
                        }
                    }
                    const y = a * (endX ** 3) + b * (endX ** 2) + c * endX + d;
                    const pos = mathToPixel([endX, y]);
                    pos[0] += side * 960;
                    ctx.lineTo(...pos);

                    ctx.stroke();
                },
                getDef: (handles, trans) => {
                    const [a1, b1, c1, d1] = findParabolaCoefficients(...handles);
                    const startX = Math.min(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0],
                        handles[3][0],
                    );
                    const endX = Math.max(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0],
                        handles[3][0],
                    );
                    const tstartX = Math.min(
                        trans[0][0],
                        trans[1][0],
                        trans[2][0],
                        trans[3][0],
                    );
                    const tendX = Math.max(
                        trans[0][0],
                        trans[1][0],
                        trans[2][0],
                        trans[3][0],
                    );
                    const minY = Math.min(handles[0][1], handles[1][1], handles[2][1], handles[3][1]);
                    const maxY = Math.max(handles[0][1], handles[1][1], handles[2][1], handles[3][1]);

                    const tminY = Math.min(trans[0][1], trans[1][1], trans[2][1], trans[3][1]);
                    const tmaxY = Math.max(trans[0][1], trans[1][1], trans[2][1], trans[3][1]);
                    const midX = (startX + endX) / 2;
                    const tmidX = (tstartX + tendX) / 2;
                    const midY = (minY + maxY) / 2;
                    const tmidY = (tminY + tmaxY) / 2;

                    let out = `y = ${(a1).toFixed(3)}x³ ${formatNum(b1)}x² ${formatNum(c1)}x ${formatNum(d1)}; ${endX.toFixed(3)}≥ x ≥${startX.toFixed(3)}`;
                    out += `\n ╰ (Approximated!) Dilate Horizontally ${
                        ((tendX-tstartX)/(endX-startX)).toFixed(3)
                    }`;
                    out += `\n ╰ (Approximated!) Dilate Vertically ${
                        ((tmaxY-tminY)/(maxY-minY)).toFixed(3)
                    }`;
                    out += `\n ╰ (Approximated!) Translate Horizontally by ${
                        (tmidX-midX).toFixed(3)
                    }`;
                    out += `\n ╰ (Approximated!) Translate Vertically by ${
                        (tmidY-midY).toFixed(3)
                    }`;
                    
                    return out;
                }
            },
            "inverse": {
                defaultHandles: [[-3, 4], [0, 3.5], [3, 3]],
                drawGraph: (handles, side, col) => {
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = col || "blue";
                    const startX = Math.min(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0],
                    );
                    const endX = Math.max(
                        handles[0][0],
                        handles[1][0],
                        handles[2][0],
                    );
                    const [a, b, c] = findHyperbolaCoefficients(...handles);
                    ctx.beginPath();
                    for (let x = startX; x <= endX; x += 0.1) {
                        const y = (a*x + b) / (x + c);
                        const pos = mathToPixel([x, y]);
                        pos[0] += side * 960;
                        if (x === startX) {
                            ctx.moveTo(...pos);
                        } else {
                            ctx.lineTo(...pos);
                        }
                    }
                    const y = (a*endX + b) / (endX + c);
                    const pos = mathToPixel([endX, y]);
                    pos[0] += side * 960;
                    ctx.lineTo(...pos);

                    ctx.stroke();
                }
            }
        };
        function drawHandles(handles, side, c, let) {
            ctx.lineWidth = 2;
            handles.forEach(handle => {
                const p = mathToPixel(handle);
                const x = p[0] + 960 * side;
                const y = p[1];
                ctx.beginPath();
                ctx.arc(x, y, 16, 0, 2 * Math.PI);
                ctx.font = "32px serif";
                ctx.strokeStyle = ctx.fillStyle = handle[2] ? "red" : c || "black";
                ctx.fillText(let || "A", x - 11, y + 12);
                ctx.stroke();
            });
        }
        let i = 5;
        let f = 100;
        const bg = document.querySelector("#bg");
        let doHandles = true;
        let _idx = 0;
        function drawFrame() {
            //ctx.putImageData(imageContainer, 0, 0);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, 1920, 1080);
            if (bg.naturalHeight > 0) {
                ctx.globalAlpha = 0.3;
                ctx.globalCompositeOperation = "multiply";
                if (bg.naturalHeight > bg.naturalWidth) {
                    const nh = bg.naturalWidth / (bg.naturalHeight / 1080);
                    ctx.drawImage(bg, (960 - nh) / 2, 0, nh, 1080);
                    ctx.drawImage(bg, (960 - nh) / 2 + 960, 0, nh, 1080);
                } else {
                    const nh = bg.naturalHeight / (bg.naturalWidth / 960);
                    ctx.drawImage(bg, 0, (1080 - nh) / 2, 960, nh);
                    ctx.drawImage(bg, 960, (1080 - nh) / 2, 960, nh);
                }
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = "source-over";
            }
            ctx.lineWidth = 2;
            ctx.strokeStyle = "black";
            ctx.beginPath();
            ctx.moveTo(960, 0);
            ctx.lineTo(960, 1080);
            ctx.stroke();
            if (doHandles) {
                gizmos.forEach(gizmo => {
                    drawHandles(gizmo.handlePositions, 0, gizmo.col, gizmo.let);
                    graphDB[gizmo.type].drawGraph(gizmo.handlePositions, 0, gizmo.col);
                    drawHandles(gizmo.transformedPositions, 1, gizmo.col, gizmo.let);
                    graphDB[gizmo.type].drawGraph(gizmo.transformedPositions, 1, gizmo.col);
                });
            } else {
                gizmos.forEach(gizmo => {
                    graphDB[gizmo.type].drawGraph(gizmo.handlePositions, 0, gizmo.col);
                    graphDB[gizmo.type].drawGraph(gizmo.transformedPositions, 1, gizmo.col);
                });
            }
            ctx.fillStyle = "black";
            ctx.font = "18px monospace";
            let t = gizmos.length + " curves";
            ctx.fillText(t, 964, 20);
            let secret = "ZXMUSHROOM63 WAS HERE - ";
            let template = (new Array(t.length)).fill("");
            template = template.map((x, i) => {
                return  String.fromCharCode(
                    secret[(Math.floor(_idx / 6) + i) % secret.length].charCodeAt(0) + Math.round(1.1 * (Math.random() - 0.5))
                );
            });
            _idx++;
            _idx %= secret.length * 6;
            ctx.fillText(template.join(""), 964, 38);
            setTimeout(drawFrame, 1000/30);
        }
        requestAnimationFrame(drawFrame);

        let selected = null;
        let url = "";
        canvas.addEventListener("mousedown", (e) => {
            if (e.button === 2 && e.shiftKey) {
                alert("best image size is aspect ratio of 960x1080");
                const inp = document.createElement("input");
                inp.type = "file";
                inp.accept = "image/*";
                inp.addEventListener("input", ()=>{
                    if (inp.files.length < 1) {
                        return;
                    }
                    if (url) {
                        URL.revokeObjectURL(url);
                    }
                    url = URL.createObjectURL(inp.files[0]);
                    document.querySelector("#bg").src = url;
                });
                inp.click();
                return;
            }
            const rect = canvas.getBoundingClientRect();
            const ratio = 1080 / innerHeight;
            const xOffset = 0;
            //alert(e.x*ratio +","+ e.y*ratio);
            const isSide = ((e.clientX - rect.x) * ratio) > 960;
            const x = ((e.clientX - rect.x) * ratio) - 960 * isSide;
            const y = ((e.clientY - rect.y) * ratio);
            const mathPoint = pixelToMath([x, y]);
            //document.querySelector("#total").innerText = [x, y, isSide].join(",");
            let nearestDist = 999999;
            let nearestHandle = null;
            gizmos.forEach(gizmo => {
                const arr = isSide ? gizmo.transformedPositions : gizmo.handlePositions;
                arr.forEach(handle => {
                    const d = dist(mathPoint, handle);
                    if (d < nearestDist) {
                        nearestDist = d;
                        nearestHandle = handle;
                    }
                })
            });
            selected = nearestHandle;
            selected[2] = 1;
        });
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            const ratio = 1080 / innerHeight;
            if (!selected) {
                return;
            }
            const isSide = ((e.clientX - rect.x) * ratio) > 960;
            const x = ((e.clientX - rect.x) * ratio) - 960 * isSide;
            const y = ((e.clientY - rect.y) * ratio);
            const mathPoint = pixelToMath([x, y]);

            selected[0] = mathPoint[0];
            selected[1] = mathPoint[1];
        });
        addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                document.querySelector("#export").style.display = "none";
            }
            if (e.key === "e") {
                document.querySelector("#export").style.display = "block";
                const outTexts = gizmos.map(x => {
                    if (!graphDB[x.type].getDef) {
                        return;
                    }
                    return `[${x.let}, ${x.type.toUpperCase()}]\n` + x.let + ")  " + graphDB[x.type].getDef(
                        x.handlePositions.map(x => [x[0], -x[1]]), //invert vertical coordinate space
                        x.transformedPositions.map(x => [x[0], -x[1]])
                    );
                });
                outTexts.sort();
                let txt = `uhh press esc to close ig<br><br>`;
                outTexts.forEach(arr => {
                    txt += arr.replaceAll("\n", "<br>") + "<br><br>";
                });
                document.querySelector("#export").innerHTML = txt;
            }
            if (e.key === "h") {
                doHandles = (!doHandles);
            }
            if (e.key === "q" && !selected) {
                gizmos.forEach(gizmo => {
                    let tmp = gizmo.transformedPositions;
                    gizmo.transformedPositions = gizmo.handlePositions;
                    gizmo.handlePositions = tmp;
                });
            }
            if ((e.key === "Backspace" || e.key === "Delete") && selected) {
                const idx = gizmos.indexOf(
                    gizmos.find((g) => g.handlePositions.includes(selected) || g.transformedPositions.includes(selected))
                );
                if (idx !== -1) {
                    gizmos.splice(idx, 1);
                }
            }
        });
        canvas.addEventListener("mouseup", () => {
            if (selected) {
                selected[2] = 0;
                selected = null;
            }
        });
        document.querySelector("#export").addEventListener("mousedown", (e)=>{
            if (e.target.tagName.toLowerCase() === "input") {
                e.target.select();
            }
        });
        const colors = ["darkred", "red", "blue", "black", "green", "purple", "darkslategrey", "indigo", "olivedrab", "rebeccapurple"];
        [...document.querySelectorAll("li[data-x]")].forEach(x => x.addEventListener("click", (e) => {
            const type = x.getAttribute("data-x");
            const clazz = graphDB[type];
            const letters = gizmos.filter(x => !!x.let).map(x => x.let.charCodeAt(0));
            let charCode = 65;
            while (letters.includes(charCode)) {
                charCode++;
            }
            if (clazz) {
                gizmos.push({
                    type: type,
                    col: colors[Math.floor(colors.length * Math.random())],
                    handlePositions: structuredClone(clazz.defaultHandles),
                    transformedPositions: structuredClone(clazz.defaultHandles),
                    let: String.fromCharCode(charCode)
                });
            }
        }));
        addEventListener("beforeunload", () => {
            localStorage.setItem("kwwkam11100412", JSON.stringify(gizmos));
        });

        fb.fill(255);
    </script>
